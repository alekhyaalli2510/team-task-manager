<!DOCTYPE html>
<html lang="en">

<head>

    <title>Create Project</title>

    <style>

        body{
            font-family:Arial;
            background:linear-gradient(to right,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
        }

        input{
            width:90%;
            padding:12px;
            margin:15px 0;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Create Project 🚀</h1>

        <form method="POST">

            <input type="text"
                   name="project_name"
                   placeholder="Enter Project Name">

            <button type="submit">
                Create Project
            </button>

        </form>

    </div>

</body>

</html>
