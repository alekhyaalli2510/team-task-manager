<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Project</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
            font-size:18px;
        }

        button{
            padding:12px 25px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

    <div class="container">
        <h1>Welcome to My Full Stack Project 🚀</h1>

        <p>Built using Flask & Python</p>

        <a href="/about">
            <button>Get Started</button>
        </a>

    </div>

</body>

</html>
