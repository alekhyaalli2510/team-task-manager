<!DOCTYPE html>
<html lang="en">

<head>
    <title>Register</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#ff512f,#dd2476);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:300px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        h1{
            margin-bottom:25px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Register 🚀</h1>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username">

            <input type="password"
                   name="password"
                   placeholder="Enter Password">

            <select name="role">

                <option value="Admin">
                    Admin
                </option>

                <option value="Member">
                    Member
                </option>

            </select>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</body>

</html>
